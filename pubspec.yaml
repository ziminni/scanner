name: scanner
description: "School Attendance Monitoring System for scanner staff and administrators."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  another_telephony: ^0.4.1
  archive: ^3.6.1
  cloud_firestore: ^5.6.12
  connectivity_plus: ^6.1.4
  excel: ^4.0.6
  file_picker: ^11.0.2
  firebase_auth: ^5.7.0
  firebase_core: ^3.15.2
  firebase_storage: ^12.4.10
  flutter:
    sdk: flutter
  go_router: ^17.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image: ^4.3.0
  intl: ^0.20.2
  mobile_scanner: ^7.0.1
  path_provider: ^2.1.5
  pdf: ^3.11.3
  printing: ^5.14.2
  qr: ^3.0.2
  shared_preferences: ^2.5.3
  spreadsheet_decoder: ^2.3.0
  uuid: ^4.5.1
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/img/logo.jpg
    - assets/templates/Students-template.xlsx
    - assets/templates/Students-template-v2.xlsx
    - assets/templates/Students-template-v3.xlsx
    - assets/templates/Teachers-template-v2.xlsx
